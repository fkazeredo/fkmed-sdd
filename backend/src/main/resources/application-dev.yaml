# Dev profile — enumerated dev defaults only (SECURITY.md); never active in production
# (ProdReadinessValidator refuses the combination). The retired in-memory login seam is replaced
# by MARIA's seeded database account (Flyway V3). SMTP is wired only in the docker dev/E2E stacks
# (Mailpit via SPRING_MAIL_HOST), so plain unit/integration runs use the LoggingMailSender.
app:
  storage:
    backend: ${FKMED_STORAGE_BACKEND:filesystem}
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:4200}
  # SPEC-0018 operator-simulation API (ADR-0017/DL-0021): enabled only in dev/e2e; the seeded
  # operator credential (Flyway V22) is the internal OPERATOR_SIM. Absent/404 by default (prod).
  sim:
    enabled: true
    operator-emails: operador-sim@fkmed.local

# FKMed backend message bundle — product locale pt-BR (docs/specs/README.md §UI norms).
# Every DomainException.code MUST have a key here (i18n completeness gate).
plan.not-found=Nenhum plano vinculado ao seu usuário foi encontrado.
internal.error=Ocorreu um erro inesperado. Tente novamente mais tarde.
access.denied=Você não tem permissão para acessar este recurso.

# Identity and access (SPEC-0002 §Error Behavior)
auth.registration-not-found=Não encontramos seus dados de cadastro. Verifique as informações e tente novamente.
auth.account-already-exists=Já existe uma conta para este beneficiário. Faça login ou recupere sua senha.
auth.dependent-underage=Dependentes menores de 18 anos são atendidos pela conta do titular.
auth.email-already-used=Este e-mail já está em uso.
auth.password-policy-violation=A senha não atende aos requisitos de segurança.
auth.verification-link-invalid=Este link de verificação é inválido ou expirou. Solicite um novo.
auth.invalid-credentials=Dados de acesso inválidos.
auth.email-not-verified=Seu e-mail ainda não foi verificado. Verifique sua caixa de entrada ou solicite um novo link.

# Verification e-mail (SPEC-0002 BR5; delivered by the identity e-mail seam — ADR-0004)
email.verification.subject=FKMed — confirme seu e-mail
email.verification.body=Olá! Para ativar seu acesso ao FKMed, confirme seu e-mail no link a seguir (válido por 24 horas): {0}

# Form login page (embedded Authorization Server)
login.title=FKMed — Entrar
login.heading=Entrar no FKMed
login.email=E-mail
login.password=Senha
login.submit=Entrar
login.error=Dados de acesso inválidos.
login.unverified=Seu e-mail ainda não foi verificado.
login.unverified.action=Solicitar novo link de verificação
login.first-access=Primeiro acesso? Crie sua conta
login.logout=Você saiu da sua conta.

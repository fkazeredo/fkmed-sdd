# FKMed backend message bundle — product locale pt-BR (docs/specs/README.md §UI norms).
# Every DomainException.code MUST have a key here (i18n completeness gate).
plan.not-found=Nenhum plano vinculado ao seu usuário foi encontrado.
internal.error=Ocorreu um erro inesperado. Tente novamente mais tarde.
access.denied=Você não tem permissão para acessar este recurso.

# Beneficiary context and authorization (SPEC-0003 §Error Behavior)
context.beneficiary-not-accessible=Beneficiário não encontrado.

# Digital card (SPEC-0007 §Error Behavior)
card.unavailable=Carteirinha indisponível — contate os canais de atendimento.

# Identity and access (SPEC-0002 §Error Behavior)
auth.registration-not-found=Não encontramos seus dados de cadastro. Verifique as informações e tente novamente.
auth.account-already-exists=Já existe uma conta para este beneficiário. Faça login ou recupere sua senha.
auth.dependent-underage=Dependentes menores de 18 anos são atendidos pela conta do titular.
auth.email-already-used=Este e-mail já está em uso.
auth.password-policy-violation=A senha não atende aos requisitos de segurança.
auth.verification-link-invalid=Este link de verificação é inválido ou expirou. Solicite um novo.
auth.reset-link-invalid=Este link de redefinição de senha é inválido ou expirou. Solicite um novo.
auth.current-password-incorrect=A senha atual informada está incorreta.
# Concurrent account update (débito técnico A / DL-0005): optimistic-lock conflict, client may retry.
auth.concurrent-update=Não foi possível concluir a operação devido a um acesso simultâneo à sua conta. Tente novamente.
# auth.invalid-credentials / auth.email-not-verified / auth.account-locked: no DomainException throws
# these today — the real form-login flow renders the equivalent login.error/login.unverified/
# login.locked Thymeleaf keys instead (BR7/BR6/BR8 semantics are enforced by IdentityUserDetailsService
# + UnverifiedAwareAuthenticationFailureHandler, just not as JSON DomainExceptions). Kept
# intentionally: SPEC-0002 §Error Behavior documents these as the STABLE codes for login failures, for
# a future API-only login consumer (SPEC-0002 notes login shapes are "finalized at implementation").
# Remove only if that consumer is dropped for good.
auth.invalid-credentials=Dados de acesso inválidos.
auth.email-not-verified=Seu e-mail ainda não foi verificado. Verifique sua caixa de entrada ou solicite um novo link.
auth.account-locked=Sua conta está temporariamente bloqueada após várias tentativas. Tente novamente em alguns minutos.

# Verification e-mail (SPEC-0002 BR5; delivered by the identity e-mail seam — ADR-0004)
email.verification.subject=FKMed — confirme seu e-mail
email.verification.body=Olá! Para ativar seu acesso ao FKMed, confirme seu e-mail no link a seguir (válido por 24 horas): {0}

# Password-recovery e-mail (SPEC-0002 BR10; identity e-mail seam — ADR-0004)
email.password-recovery.subject=FKMed — redefinição de senha
email.password-recovery.body=Recebemos um pedido para redefinir a senha do seu acesso ao FKMed. Use o link a seguir (válido por 30 minutos): {0} — se não foi você, ignore este e-mail.

# Password-changed security notice (SPEC-0002 BR10/BR11; identity e-mail seam — ADR-0004)
email.password-changed.subject=FKMed — sua senha foi alterada
email.password-changed.body=A senha do seu acesso ao FKMed foi alterada. Se não foi você, contate imediatamente nossos canais de atendimento.

# Notifications (SPEC-0004 §Error Behavior + in-app content)
notification.not-found=Notificação não encontrada.
notification.preference-mandatory=Este tipo de notificação é obrigatório e não pode ter o e-mail desativado.
notification.account.password-changed.title=Senha alterada
notification.account.password-changed.body=A senha da sua conta foi alterada. Se não foi você, entre em contato imediatamente com nossos canais de atendimento.
notification.account.contact-changed.title=Dados de contato atualizados
notification.account.contact-changed.body=Seus dados de contato foram atualizados. Se não foi você, entre em contato imediatamente com nossos canais de atendimento.
# Appointment notifications (SPEC-0009 x SPEC-0004). Args: {0}=protocolo, {1}=consulta/exame,
# {2}=codigo da especialidade/exame, {3}=data/hora. Sem dado sensivel (BR4).
notification.appointment.kind.CONSULTATION=consulta
notification.appointment.kind.EXAM=exame
notification.appointment.confirmed.title=Agendamento confirmado
notification.appointment.confirmed.body=Sua {1} ({2}) está confirmada para {3}. Protocolo {0}. Veja os detalhes em Meus Agendamentos.
notification.appointment.cancelled.title=Agendamento cancelado
notification.appointment.cancelled.body=Sua {1} ({2}) de {3} foi cancelada. Protocolo {0}.
notification.appointment.rescheduled.title=Agendamento reagendado
notification.appointment.rescheduled.body=Sua {1} ({2}) foi reagendada para {3}. Protocolo {0}.
# Telemedicine and clinical-document notifications (SPEC-0010 x SPEC-0011 x SPEC-0004). Sem conteudo
# clinico (BR4): o link leva ao atendimento / a Minha Saude.
notification.tele.turn-reached.title=É a sua vez na Telemedicina
notification.tele.turn-reached.body=O profissional está pronto para o seu atendimento. Entre na sala agora.
notification.tele.session-closed.title=Atendimento de Telemedicina encerrado
notification.tele.session-closed.body=Seu atendimento foi encerrado. Veja o resumo e os documentos emitidos em Minha Saúde.
notification.clinical-document.issued.title=Novo documento em Minha Saúde
notification.clinical-document.issued.body=Um novo documento ({0}) está disponível em Minha Saúde.
notification.clinical-document.kind.EXAM_ORDER=solicitação de exames
notification.clinical-document.kind.REFERRAL=encaminhamento
notification.clinical-document.kind.PRESCRIPTION=receituário
notification.clinical-document.kind.SICK_NOTE=atestado

# Finance invoice notification (SPEC-0013 x SPEC-0004). No sensitive data (never the digitable line
# or PIX code): only competência, amount and due date.
notification.finance.invoice-issued.title=Nova fatura disponível
notification.finance.invoice-issued.body=Sua fatura de {0} no valor de {1} está disponível. Vencimento em {2}.
# Guide status notifications (SPEC-0012 x SPEC-0004). Args: {0}=numero da guia, {1}=status. Sem
# dado clinico/de item (BR8) — o motivo de negacao, quando houver, e anexado a parte.
notification.guide.status-changed.title=Guia com mudança de status
notification.guide.status-changed.body=Sua guia {0} está {1}.
notification.guide.status-changed.denial-reason=Motivo: {0}
notification.guide.status.EM_ANALISE=em análise
notification.guide.status.AUTORIZADA=autorizada
notification.guide.status.PARCIALMENTE_AUTORIZADA=parcialmente autorizada
notification.guide.status.NEGADA=negada
notification.guide.status.CANCELADA=cancelada
notification.guide.status.EXECUTADA=executada


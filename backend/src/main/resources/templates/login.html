<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="#{login.title}">FKMed</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; min-height: 100vh;
           align-items: center; justify-content: center; background: #f4f6f8; margin: 0; }
    .card { background: #fff; padding: 2rem 2.5rem; border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,.08); width: 100%; max-width: 22rem; }
    h1 { font-size: 1.25rem; margin: 0 0 1.25rem; color: #0f766e; }
    label { display: block; font-size: .875rem; margin-bottom: .25rem; color: #334155; }
    input { width: 100%; box-sizing: border-box; padding: .5rem .75rem; margin-bottom: 1rem;
            border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
    button { width: 100%; padding: .625rem; background: #0f766e; color: #fff; border: 0;
             border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .error { background: #fef2f2; color: #b91c1c; padding: .5rem .75rem; border-radius: 8px;
             font-size: .875rem; margin-bottom: 1rem; }
    .info { background: #f0fdf4; color: #15803d; padding: .5rem .75rem; border-radius: 8px;
            font-size: .875rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
<main class="card">
  <h1 th:text="#{login.heading}">Entrar</h1>
  <div class="error" th:if="${param.error}" th:text="#{login.error}">Erro</div>
  <div class="error" th:if="${param.unverified}">
    <span th:text="#{login.unverified}">Não verificado</span>
    <a href="/verificar-email" th:text="#{login.unverified.action}">Reenviar</a>
  </div>
  <div class="info" th:if="${param.logout}" th:text="#{login.logout}">Logout</div>
  <form th:action="@{/login}" method="post">
    <label for="username" th:text="#{login.email}">E-mail</label>
    <input type="email" id="username" name="username" autocomplete="username" autofocus required/>
    <label for="password" th:text="#{login.password}">Senha</label>
    <input type="password" id="password" name="password"
           autocomplete="current-password" required/>
    <button type="submit" th:text="#{login.submit}">Entrar</button>
  </form>
  <p style="margin-top:1rem;font-size:.875rem;text-align:center;">
    <a href="/primeiro-acesso" th:text="#{login.first-access}">Primeiro acesso</a>
  </p>
</main>
</body>
</html>

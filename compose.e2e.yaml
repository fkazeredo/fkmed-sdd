# FKMed ISOLATED E2E stack (BOOTSTRAP §3): throwaway tmpfs Postgres, own ports, own project
# name. Playwright targets http://localhost:4201 — the E2E suite NEVER touches the dev
# database (docs/architecture/testing.md).

name: fkmed-e2e

services:
  db-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fkmed
      POSTGRES_USER: fkmed
      POSTGRES_PASSWORD: fkmed # throwaway tmpfs database
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fkmed -d fkmed']
      interval: 5s
      timeout: 3s
      retries: 10

  # Mailpit SMTP catcher for the first-access journey (ADR-0004): the E2E reads the verification
  # link from its HTTP API on :8025.
  mailpit-e2e:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 'true'
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    ports:
      - '8025:8025'

  app-e2e:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev # real seeded MARIA account replaces the retired dev-login seam
      DB_URL: jdbc:postgresql://db-e2e:5432/fkmed
      DB_USERNAME: fkmed
      DB_PASSWORD: fkmed
      APP_ISSUER: http://localhost:4201
      APP_OIDC_REDIRECT_URIS: http://localhost:4201/
      APP_OIDC_POST_LOGOUT_REDIRECT_URIS: http://localhost:4201/
      APP_ALLOWED_ORIGINS: '' # same origin behind the proxy
      SPRING_MAIL_HOST: mailpit-e2e
      SPRING_MAIL_PORT: 1025
      APP_WEB_BASE_URL: http://localhost:4201 # verification links resolve to the E2E SPA origin
      FKMED_STORAGE_BACKEND: filesystem
      FKMED_STORAGE_FILESYSTEM_ROOT: /fkmed/uploads
    depends_on:
      db-e2e:
        condition: service_healthy
      mailpit-e2e:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/actuator/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    tmpfs:
      - /fkmed

  frontend-e2e:
    build:
      context: frontend
    environment:
      BACKEND_HOST: app-e2e:8080
    ports:
      - '4201:80'
    depends_on:
      app-e2e:
        condition: service_healthy

<div class="flex min-h-screen flex-col bg-slate-100">
  <header class="flex items-center justify-between bg-teal-800 px-4 py-3 text-white shadow">
    <span class="text-xl font-semibold" data-testid="brand">{{ 'app.title' | translate }}</span>
    <div class="flex items-center gap-3">
      <app-beneficiary-selector />
      <app-notification-bell />
      <span class="text-sm" [attr.aria-label]="'shell.loggedUser' | translate"
            data-testid="username">{{ auth.username() }}</span>
      <p-button
        size="small"
        severity="secondary"
        [label]="'shell.logout' | translate"
        (onClick)="logout()"
      />
    </div>
  </header>

  <div class="flex flex-1">
    <nav class="w-56 bg-white p-4 shadow-sm" [attr.aria-label]="'app.title' | translate">
      <ul>
        <li>
          <a
            routerLink="/home"
            routerLinkActive="font-semibold text-teal-800"
            class="block rounded px-3 py-2 hover:bg-slate-100"
            data-testid="nav-home"
          >
            {{ 'nav.home' | translate }}
          </a>
        </li>
        <li>
          <a
            routerLink="/meu-plano"
            routerLinkActive="font-semibold text-teal-800"
            class="block rounded px-3 py-2 hover:bg-slate-100"
            data-testid="nav-meu-plano"
          >
            {{ 'nav.meuPlano' | translate }}
          </a>
        </li>
        <li>
          <a
            routerLink="/carteirinha"
            routerLinkActive="font-semibold text-teal-800"
            class="block rounded px-3 py-2 hover:bg-slate-100"
            data-testid="nav-carteirinha"
          >
            {{ 'nav.carteirinha' | translate }}
          </a>
        </li>
        <li>
          <a
            routerLink="/seguranca"
            routerLinkActive="font-semibold text-teal-800"
            class="block rounded px-3 py-2 hover:bg-slate-100"
            data-testid="nav-seguranca"
          >
            {{ 'nav.seguranca' | translate }}
          </a>
        </li>
      </ul>
      <p class="mt-4 px-3 text-xs text-slate-400">{{ 'nav.placeholder' | translate }}</p>
    </nav>

    <main class="flex-1">
      <router-outlet />
    </main>
  </div>
</div>

<div class="flex flex-col gap-3">
  <label class="sr-only" for="option-search-input">{{ 'rede.busca.filtrarLabel' | translate }}</label>
  <input
    id="option-search-input"
    type="text"
    class="w-full rounded border border-slate-300 px-3 py-2"
    data-testid="option-search-input"
    [attr.placeholder]="'rede.busca.filtrarPlaceholder' | translate"
    [value]="query()"
    (input)="onQueryInput($any($event.target).value)"
  />

  @if (groups().length === 0) {
    <p class="text-sm text-slate-500" role="status" data-testid="option-list-empty">
      {{ 'rede.busca.semResultado' | translate: { termo: query() } }}
    </p>
  } @else {
    <ul class="max-h-80 overflow-y-auto">
      @for (group of groups(); track group.letter) {
        <li>
          <h3
            class="sticky top-0 bg-slate-50 px-1 py-1 text-xs font-semibold text-slate-500"
            [attr.data-testid]="'option-group-' + group.letter"
          >
            {{ group.letter }}
          </h3>
          <ul>
            @for (option of group.options; track option.value) {
              <li>
                <button
                  type="button"
                  class="w-full rounded px-2 py-2 text-left hover:bg-slate-100"
                  [attr.data-testid]="'option-item-' + option.value"
                  (click)="select(option.value)"
                >
                  {{ option.label }}
                </button>
              </li>
            }
          </ul>
        </li>
      }
    </ul>
  }
</div>

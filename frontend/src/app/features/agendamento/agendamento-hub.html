<section class="mx-auto max-w-4xl p-4" aria-labelledby="agendamento-hub-title" data-testid="agendamento-hub-page">
  <h1 id="agendamento-hub-title" class="mb-4 text-2xl font-semibold text-teal-800">
    {{ 'agendamento.hub.title' | translate }}
  </h1>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    @for (card of cards; track card.key) {
      @if (card.routerLink) {
        <a
          [routerLink]="card.routerLink"
          class="flex flex-col items-start gap-2 rounded-xl bg-white p-5 shadow hover:bg-slate-50"
          [attr.data-testid]="'agendamento-hub-' + card.key"
        >
          <i [class]="card.icon + ' text-3xl text-teal-700'" aria-hidden="true"></i>
          <span class="text-lg font-medium text-teal-800">{{ card.labelKey | translate }}</span>
        </a>
      } @else {
        <button
          type="button"
          disabled
          class="flex flex-col items-start gap-2 rounded-xl bg-white p-5 text-left shadow disabled:cursor-not-allowed disabled:opacity-50"
          [attr.data-testid]="'agendamento-hub-' + card.key"
        >
          <i [class]="card.icon + ' text-3xl text-teal-700'" aria-hidden="true"></i>
          <span class="text-lg font-medium text-teal-800">{{ card.labelKey | translate }}</span>
          <span
            class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-500"
            [attr.data-testid]="'agendamento-hub-' + card.key + '-em-breve'"
          >
            {{ 'home.emBreve' | translate }}
          </span>
        </button>
      }
    }
  </div>
</section>

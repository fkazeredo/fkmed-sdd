<section class="mx-auto max-w-md p-4" aria-labelledby="forgot-password-title">
  <h1 id="forgot-password-title" class="mb-6 text-2xl font-semibold text-teal-800">
    {{ 'recuperarSenha.title' | translate }}
  </h1>

  @if (done()) {
    <div class="rounded-xl bg-white p-5 shadow" data-testid="forgot-password-done">
      <p class="mb-4 text-slate-600" role="status">
        {{ 'recuperarSenha.confirmacao' | translate }}
      </p>
      <button
        type="button"
        class="rounded bg-teal-700 px-4 py-2 text-white"
        data-testid="forgot-password-login"
        (click)="goToLogin()"
      >
        {{ 'recuperarSenha.voltarLogin' | translate }}
      </button>
    </div>
  } @else {
    <form class="rounded-xl bg-white p-5 shadow" (ngSubmit)="submit()" data-testid="forgot-password-form">
      <label for="email" class="mb-1 block text-sm text-slate-600">
        {{ 'recuperarSenha.email' | translate }}
      </label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="username"
        class="mb-1 w-full rounded border border-slate-300 px-3 py-2"
        [(ngModel)]="email"
      />
      @if (email.length > 0 && !emailValid) {
        <p class="mb-2 text-sm text-red-600">{{ 'recuperarSenha.validation.email' | translate }}</p>
      }

      <button
        type="submit"
        class="mt-3 w-full rounded bg-teal-700 px-4 py-2 text-white disabled:opacity-50"
        data-testid="forgot-password-submit"
        [disabled]="!emailValid || loading()"
      >
        {{ (loading() ? 'common.processando' : 'recuperarSenha.submit') | translate }}
      </button>
    </form>
  }
</section>

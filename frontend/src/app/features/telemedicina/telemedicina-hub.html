<section class="mx-auto max-w-4xl p-4" aria-labelledby="telemedicina-hub-title" data-testid="telemedicina-hub-page">
  <h1 id="telemedicina-hub-title" class="mb-4 text-2xl font-semibold text-teal-800">
    {{ 'telemedicina.hub.title' | translate }}
  </h1>

  <app-tele-instability-banner />

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    @for (card of cards; track card.key) {
      <a
        [routerLink]="card.routerLink"
        class="flex flex-col items-start gap-2 rounded-xl bg-white p-5 shadow hover:bg-slate-50"
        [attr.data-testid]="'telemedicina-hub-' + card.key"
      >
        <i [class]="card.icon + ' text-3xl text-teal-700'" aria-hidden="true"></i>
        <span class="text-lg font-medium text-teal-800">{{ card.labelKey | translate }}</span>
        <span class="text-sm text-slate-500">{{ card.descriptionKey | translate }}</span>
      </a>
    }
  </div>
</section>

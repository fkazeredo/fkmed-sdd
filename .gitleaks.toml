# Gitleaks configuration (DECISIONS-BASELINE §0023).
# Default rules + an allowlist of ONLY the enumerated dev-only defaults (see SECURITY.md).
# Every allowlisted value is refused in production by ProdReadinessValidator.

[extend]
useDefault = true

[allowlist]
description = "Enumerated dev-only defaults (SECURITY.md); blocked in prod by ProdReadinessValidator"
regexes = [
  # MARIA seeded dev account password (SPEC-0002; refused in prod by ProdReadinessValidator)
  '''maria12345''',
  # disposable account-security E2E password (SPEC-0003 débito B; refused in prod by ProdReadinessValidator)
  '''seguranca12345''',
  # disposable profile E2E password (SPEC-0006 Phase 2; refused in prod by ProdReadinessValidator)
  '''perfilE2e12345''',
  # disposable terms-interception E2E password (SPEC-0006 Phase 2; refused in prod by ProdReadinessValidator)
  '''termosE2e12345''',
  # disposable no-reimbursement E2E password (SPEC-0015 AC8; refused in prod by ProdReadinessValidator)
  '''reembolso12345''',
  # retired in-memory dev-login seam (SPEC-0001 BR8 — replaced by SPEC-0002); still referenced
  # in historical docs (README, architecture, skills)
  '''dev12345''',
  # dev database password default
  '''POSTGRES_PASSWORD[=:]\s*\$?\{?POSTGRES_PASSWORD:?-?fkmed\}?''',
  '''DB_PASSWORD[=:]\s*\$?\{?(DB_PASSWORD|POSTGRES_PASSWORD):?-?fkmed\}?''',
  # dev Grafana admin default
  '''GRAFANA_ADMIN_PASSWORD[=:]\s*\$?\{?GRAFANA_ADMIN_PASSWORD:?-?admin\}?''',
]
paths = [
  # committed example env with dev defaults only
  '''\.env\.example$''',
  # build outputs (never committed — .gitignore); keeps filesystem scans equal to CI git scans
  '''backend/target/''',
  '''frontend/dist/''',
  '''frontend/coverage/''',
  '''node_modules/''',
]

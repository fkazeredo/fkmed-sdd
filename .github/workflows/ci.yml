# Main CI (BOOTSTRAP §3): backend verify (all gates), PIT mutation, Flyway validate on real
# Postgres, frontend lint+test+build+audit. Job names become required status checks.
name: CI

# Full battery runs on PRs and protected/release branches only. feature/bugfix pushes do NOT
# trigger it (the same commit would run again on the PR — pure duplication): dev-time
# validation is the local gates; the PR is where CI judges the slice. Manual runs via
# workflow_dispatch when a mid-slice CI opinion is genuinely needed.
on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-verify:
    name: Backend verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-commit-id feeds /api/system/version
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify (tests, ArchUnit, Modulith, snapshots, coverage)
        working-directory: backend
        run: ./mvnw -B verify
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: ignore
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports

  mutation:
    name: Mutation (PIT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: PIT mutation coverage (threshold 60, critical domain)
        working-directory: backend
        run: ./mvnw -B -Pmutation test-compile org.pitest:pitest-maven:mutationCoverage

  flyway-validate:
    name: Flyway validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fkmed
          POSTGRES_USER: fkmed
          POSTGRES_PASSWORD: fkmed
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fkmed -d fkmed" --health-interval=5s
          --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Migrate and validate on real Postgres
        working-directory: backend
        run: >-
          ./mvnw -B flyway:migrate flyway:validate
          -Dflyway.url=jdbc:postgresql://localhost:5432/fkmed
          -Dflyway.user=fkmed -Dflyway.password=fkmed

  frontend:
    name: Frontend lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Audit (fail on critical)
        run: npm audit --audit-level=critical

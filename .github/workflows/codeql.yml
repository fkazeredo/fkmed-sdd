# CodeQL static analysis: Java (manual build) + JavaScript/TypeScript, weekly + on PR.
name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '30 5 * * 1' # weekly, Monday 05:30 UTC

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Manual Java build
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: ./mvnw -B -DskipTests -Dspotless.check.skip=true -Dcheckstyle.skip=true package
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

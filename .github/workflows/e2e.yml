# Playwright E2E against the ISOLATED compose stack (never the dev database).
name: E2E

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'release/**', 'hotfix/**']
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start isolated E2E stack
        run: docker compose -f compose.e2e.yaml up -d --build --wait
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f compose.e2e.yaml logs
      - name: Tear down
        if: always()
        run: docker compose -f compose.e2e.yaml down -v
